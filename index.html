<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CysVis</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>CysVis</h1>
          <p class="subtitle">Cysteine Residue &amp; Variant Visualizer</p>
        </div>
        <form id="protein-form" class="protein-form">
          <label for="protein-id">UniProt ID</label>
          <input id="protein-id" name="protein-id" type="text" value="P00533" />
          <button type="submit">Go</button>
          <button id="export-png" type="button" class="secondary-button">Export PNG</button>
        </form>
      </header>

      <main class="workspace">
        <section class="viewer-panel">
          <div class="viewer-frame">
            <div id="viewer-status" class="viewer-status">Loading KEAP1 AlphaFold structure...</div>
            <div id="viewer" class="viewer"></div>
          </div>
        </section>

        <aside class="sidebar">
          <section class="panel">
            <h2>Protein</h2>
            <div id="protein-summary" class="summary"></div>
            <p id="protein-note" class="note"></p>
          </section>

          <section class="panel">
            <h2>Domains</h2>
            <div id="domain-controls" class="control-list"></div>
          </section>

          <section class="panel">
            <h2>Cysteine Annotation</h2>
            <div class="control-list">
              <label class="stacked-control" for="annotation-layer-select">
                <span>Active layer</span>
                <select id="annotation-layer-select"></select>
              </label>
            </div>
            <p id="annotation-layer-note" class="note"></p>
          </section>

          <section class="panel">
            <h2>Layers</h2>
            <div class="control-list">
              <label class="control-item">
                <input id="toggle-cysteines" type="checkbox" checked />
                <span>Cysteines</span>
              </label>
              <label class="control-item">
                <input id="toggle-variants" type="checkbox" checked />
                <span>Variants (ClinVar)</span>
              </label>
              <label class="control-item">
                <input id="toggle-surface" type="checkbox" />
                <span>Surface</span>
              </label>
            </div>
          </section>

          <section class="panel">
            <h2>Legend</h2>
            <div id="legend" class="legend"></div>
          </section>
        </aside>
      </main>

      <section class="detail-panel panel">
        <h2>Residue Detail</h2>
        <div id="detail-content" class="detail-content"></div>
      </section>

      <section class="table-panel panel">
        <h2>Cysteine Table</h2>
        <div id="cysteine-table" class="table-shell"></div>
      </section>
    </div>

    <script src="./js/data.js"></script>
    <script src="./js/variants.js"></script>
    <script src="./js/hotspots.js"></script>
    <script src="./js/viewer.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
